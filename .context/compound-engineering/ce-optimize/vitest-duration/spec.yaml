name: vitest-duration
description: Minimize npm test wall time without regressing pass rate

metric:
  primary:
    type: hard
    name: vitest_seconds
    direction: minimize
  degenerate_gates:
    - name: test_pass_rate
      check: ">= 1.0"
      description: All Vitest tests must pass
    - name: tests_passed
      check: "== 1"
      description: npm test exit success
  diagnostics:
    - name: test_count

measurement:
  command: "bash scripts/measure-vitest-duration.sh"
  timeout_seconds: 120
  working_directory: "."
  stability:
    mode: repeat
    repeat_count: 3
    aggregation: median
    noise_threshold: 0.15

scope:
  mutable:
    - "vitest.config.ts"
    - "package.json"
  immutable:
    - "scripts/measure-vitest-duration.sh"
    - "test/**"
    - "src/**"

execution:
  mode: serial
  backend: worktree
  max_concurrent: 1

parallel:
  port_strategy: none
  shared_files: []

dependencies:
  approved: []

constraints:
  - "Do not change test assertions or remove tests"
  - "Do not skip golden or check steps in CI"

stopping:
  max_iterations: 4
  max_hours: 1
  plateau_iterations: 3
  target_reached: false

max_runner_up_merges_per_batch: 0
